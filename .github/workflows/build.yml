name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Unzip project
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found zip: $ZIP"
          unzip "$ZIP"

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
          unzip -q gradle-8.1-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.1/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: AppKiller
        run: gradle wrapper --gradle-version 8.1

      - name: Make gradlew executable
        working-directory: AppKiller
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: AppKiller
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AppKiller-debug
          path: AppKiller/app/build/outputs/apk/debug/app-debug.apk
